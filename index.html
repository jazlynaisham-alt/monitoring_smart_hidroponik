<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Hidroponik Pakcoy 🌱</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ====== SEMUA STYLE KAMU TETAP ====== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka', sans-serif;
}

body{
background:linear-gradient(135deg,#ffffff,#dff6ff,#bde0fe,#a2d2ff);
min-height:100vh;
padding:20px;
color:#003049;
overflow-x:hidden;
position:relative;
}

/* TITLE */
.title{
text-align:center;
font-size:52px;
font-weight:bold;
color:#023e8a;
animation:floatText 3s ease-in-out infinite;
}

@keyframes floatText{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.sub{text-align:center;margin-bottom:10px;color:#0077b6;}

.team{
text-align:center;
margin:10px auto;
background:white;
padding:10px 20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
width:fit-content;
animation:pop 2s infinite;
}

@keyframes pop{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

.hydro-box{
text-align:center;
margin:15px auto;
background:linear-gradient(135deg,#ffffff,#e0f7ff);
padding:15px;
border-radius:25px;
font-weight:bold;
font-size:18px;
color:#0077b6;
box-shadow:0 0 20px rgba(0,0,0,0.08);
animation:shake 2s infinite;
}

@keyframes shake{
0%,100%{transform:rotate(0deg)}
50%{transform:rotate(1deg)}
}

/* EMOJI BACKGROUND */
.veggie{
position:fixed;
font-size:26px;
opacity:0.55;
animation:floatVeg linear infinite;
z-index:0;
}

@keyframes floatVeg{
0%{transform:translateY(120vh) rotate(0deg);}
100%{transform:translateY(-120vh) rotate(360deg);}
}

.v1{left:3%;animation-duration:10s;}
.v2{left:8%;animation-duration:14s;}
.v3{left:12%;animation-duration:18s;}
.v4{left:18%;animation-duration:12s;}
.v5{left:25%;animation-duration:16s;}
.v6{left:33%;animation-duration:20s;}
.v7{left:40%;animation-duration:13s;}
.v8{left:48%;animation-duration:17s;}
.v9{left:56%;animation-duration:15s;}
.v10{left:64%;animation-duration:21s;}
.v11{left:72%;animation-duration:11s;}
.v12{left:80%;animation-duration:19s;}
.v13{left:88%;animation-duration:14s;}
.v14{left:94%;animation-duration:22s;}

.farmer{
position:fixed;
font-size:34px;
bottom:10px;
left:-120px;
animation:walk 10s linear infinite;
z-index:1;
}

@keyframes walk{
0%{left:-120px}
100%{left:110%}
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:20px;
position:relative;
z-index:2;
}

.graph-box{
background:rgba(255,255,255,0.78);
backdrop-filter:blur(14px);
padding:18px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
height:360px;
display:flex;
flex-direction:column;
justify-content:space-between;
position:relative;
}

.system-box{
grid-column:span 2;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
padding:20px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.status-item{
padding:12px 18px;
border-radius:14px;
font-weight:bold;
min-width:150px;
}

.on{background:#b7f7c6;color:#065f46;}
.off{background:#ffb3b3;color:#7f1d1d;}

canvas{max-height:220px !important;}

.gauge-text{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.gauge-value{
font-size:36px;
font-weight:800;
color:#023e8a;
}

.gauge-unit{
font-size:14px;
color:#0077b6;
}

/* ====== GRAFIK BARU ====== */
.line-box{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
padding:18px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
height:300px;
}

/* HISTORY */
.history-box{
grid-column:span 2;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
padding:18px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.history-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:10px;
}

.history-item{
background:rgba(255,255,255,0.7);
padding:10px;
border-radius:14px;
font-size:13px;
box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<!-- EMOJI BACKGROUND -->
<div class="veggie v1">🥬</div>
<div class="veggie v2">🥦</div>
<div class="veggie v3">🥒</div>
<div class="veggie v4">🌽</div>
<div class="veggie v5">🥕</div>
<div class="veggie v6">🍀</div>
<div class="veggie v7">🌱</div>
<div class="veggie v8">🥬</div>
<div class="veggie v9">🥦</div>
<div class="veggie v10">🥒</div>
<div class="farmer">👨‍🌾🚜✨</div>

<div class="title">🌱 SMART HIDROPONIK PAKCOY 🌱</div>
<div class="sub">💧 TDS • 📏 Ultrasonik • 🤖 ESP32 IoT</div>

<div class="team">
Kelompok 5 ✨<br>
Iqbal • Jazlyn • Najmi • Ilham
</div>

<div class="hydro-box">
HI..DRO..PO..NIK.. COY! COY!! PAKCOY!!! 🌱😂🚜🔥
</div>

<div class="container">

<div class="system-box">
<h2>⚙️ SYSTEM STATUS</h2>
</div>

<div class="graph-box">
<h3>💧 TDS Gauge</h3>
<canvas id="tdsGauge"></canvas>
<div class="gauge-text">
<div class="gauge-value" id="tdsText">0</div>
<div class="gauge-unit">PPM</div>
</div>
</div>

<div class="graph-box">
<h3>📏 Ultrasonik Gauge</h3>
<canvas id="ultraGauge"></canvas>
<div class="gauge-text">
<div class="gauge-value" id="ultraText">0</div>
<div class="gauge-unit">CM</div>
</div>
</div>

<!-- 🔥 GRAFIK BARU -->
<div class="line-box">
<h3>📈 Grafik TDS</h3>
<canvas id="lineTDS"></canvas>
</div>

<div class="line-box">
<h3>📈 Grafik Ultrasonik</h3>
<canvas id="lineUltra"></canvas>
</div>

<!-- HISTORY -->
<div class="history-box">
<h3>🧾 Riwayat 15 Data 🌱💧</h3>
<div id="history" class="history-list"></div>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzJ-9W5zACuk5QQnwbhErWBuswIllaLbivkp2P3uyBo314N0Otjb8G4kxiOfezsaIqK/exec";

let historyData=[];

/* GAUGE */
const tdsGauge=new Chart(document.getElementById("tdsGauge"),{
type:'doughnut',
data:{datasets:[{data:[0,1000],backgroundColor:["#00c2ff","#e6f7ff"],cutout:'78%'}]},
options:{plugins:{legend:{display:false}}}
});

const ultraGauge=new Chart(document.getElementById("ultraGauge"),{
type:'doughnut',
data:{datasets:[{data:[0,100],backgroundColor:["#00e5ff","#e6fbff"],cutout:'78%'}]},
options:{plugins:{legend:{display:false}}}
});

/* 🔥 GRAFIK AESTHETIC */
const lineTDS=new Chart(document.getElementById("lineTDS"),{
type:'line',
data:{labels:[],datasets:[{
data:[],
borderColor:"#0077b6",
backgroundColor:"rgba(0,119,182,0.25)",
fill:true,
tension:0.4,
pointRadius:0,
borderWidth:3
}]},
options:{plugins:{legend:{display:false}}}
});

const lineUltra=new Chart(document.getElementById("lineUltra"),{
type:'line',
data:{labels:[],datasets:[{
data:[],
borderColor:"#00b4d8",
backgroundColor:"rgba(0,180,216,0.25)",
fill:true,
tension:0.4,
pointRadius:0,
borderWidth:3
}]},
options:{plugins:{legend:{display:false}}}
});

async function load(){
const res=await fetch(API_URL+"?t="+Date.now());
const data=await res.json();

let last=data[data.length-1];

let tds=Number(last.tds)||0;
let cm=Number(last.cm)||0;

document.getElementById("tdsText").innerText=tds;
document.getElementById("ultraText").innerText=cm;

tdsGauge.data.datasets[0].data=[tds,1000-tds];
ultraGauge.data.datasets[0].data=[cm,100-cm];

tdsGauge.update();
ultraGauge.update();

/* history */
historyData.unshift({tds,cm,emoji:["🌱","🥬","🥦","🚜","👨‍🌾","💧"][Math.floor(Math.random()*6)]});
if(historyData.length>15) historyData.pop();

/* update list */
document.getElementById("history").innerHTML=
historyData.map(d=>`
<div class="history-item">
${d.emoji} 💧 ${d.tds} ppm<br>
📏 ${d.cm} cm
</div>
`).join("");

/* update chart */
lineTDS.data.labels=historyData.map((_,i)=>i);
lineTDS.data.datasets[0].data=historyData.map(d=>d.tds);

lineUltra.data.labels=historyData.map((_,i)=>i);
lineUltra.data.datasets[0].data=historyData.map(d=>d.cm);

lineTDS.update();
lineUltra.update();

}

load();
setInterval(load,2000);

</script>

</body>
</html>
